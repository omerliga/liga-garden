<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LIGA Garden</title>
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LIGA Garden">
<link rel="manifest" href="/manifest.json">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3CFW7DFK8K"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-3CFW7DFK8K');
</script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --deep:  #1a2e1c;
    --deep2: #0f1c10;
    --moss:  #3d5c40;
    --sage:  #7a9e7e;
    --gold:  #c9a84c;
    --cream: #f5f0e8;
    --muted: rgba(255,255,255,0.55);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100%; width:100%; overflow:hidden;
    background:var(--deep2);
    font-family:'Heebo', sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  /* ── SPLASH ── */
  #splash {
    position:fixed; inset:0; z-index:9999;
    background:#000;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    transition:opacity 1s ease, transform 1s ease;
    overflow:hidden;
  }
  #splash.out { opacity:0; transform:scale(1.05); pointer-events:none; }
  #splash-bg {
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    opacity:0; transition:opacity 1.5s ease;
  }
  #splash-bg.loaded { opacity:1; }
  #splash-overlay {
    position:absolute; inset:0;
    background:linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.6) 100%);
  }
  .s-logo-wrap {
    position:relative; z-index:2;
    display:flex; flex-direction:column; align-items:center;
    opacity:0; animation:riseIn 1s ease 0.3s forwards;
  }
  .s-logo {
    width:220px; height:220px; object-fit:contain;
    animation:spinLogo 20s linear infinite;
    filter:drop-shadow(0 0 20px rgba(0,0,0,0.5));
  }
  .s-sub {
    font-size:10px; letter-spacing:5px; color:rgba(255,255,255,0.75);
    text-transform:uppercase; margin-top:8px;
    position:relative; z-index:2;
    opacity:0; animation:riseIn 1s ease 0.9s forwards;
  }
  .s-bar {
    width:48px; height:1px; background:rgba(255,255,255,0.15);
    margin-top:28px; overflow:hidden; border-radius:1px;
    position:relative; z-index:2;
    opacity:0; animation:riseIn 0.5s ease 1.1s forwards;
  }
  .s-bar-fill {
    height:100%; width:0;
    background:linear-gradient(90deg,var(--sage),var(--gold));
    animation:loadBar 2s ease 1.2s forwards;
  }

  /* ── SHELL ── */
  #app {
    height:100vh; width:100%; max-width:480px; margin:0 auto;
    position:relative; overflow:hidden; background:var(--deep2);
  }

  /* ── TOPBAR ── */
  .topbar {
    position:absolute; top:0; left:0; right:0; z-index:200;
    padding:16px 20px;
    display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(to bottom,rgba(10,18,10,0.9) 0%,transparent 100%);
  }
  .topbar-left { display:flex; flex-direction:column; gap:2px; }
  .topbar-logo { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; color:var(--cream); letter-spacing:5px; }
  .topbar-client { font-size:10px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; font-weight:500; min-height:14px; }
  .topbar-btn {
    width:36px; height:36px; background:rgba(255,255,255,0.1);
    backdrop-filter:blur(8px); border-radius:50%;
    border:1px solid rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s;
  }
  .topbar-btn:hover { background:rgba(255,255,255,0.2); }
  .topbar-btn svg { width:15px; height:15px; stroke:white; fill:none; stroke-width:2; }

  /* ── FEED ── */
  #feed {
    height:100vh; width:100%;
    overflow-y:scroll; scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch; scrollbar-width:none;
  }
  #feed::-webkit-scrollbar { display:none; }

  /* ── CARD ── */
  .card {
    height:100vh; width:100%;
    scroll-snap-align:start; scroll-snap-stop:always;
    position:relative; overflow:hidden; flex-shrink:0;
  }
  .card-img {
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    transition:transform 7s ease;
  }
  .card.in-view .card-img { transform:scale(1.07); }

  /* before/after grid */
  .card-grid {
    position:absolute; inset:0;
    display:grid; grid-template-columns:1fr 1fr; gap:2px;
  }
  .card-grid .col { position:relative; overflow:hidden; }
  .card-grid .col img { width:100%; height:100%; object-fit:cover; }
  .ba-label {
    position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
    font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    color:white; padding:4px 12px;
    background:rgba(0,0,0,0.5); backdrop-filter:blur(4px); border-radius:3px;
    white-space:nowrap;
  }

  /* placeholder */
  .card-ph {
    position:absolute; inset:0;
    background:linear-gradient(155deg,#1a3020 0%,#2a4a2d 50%,#162814 100%);
    display:flex; align-items:center; justify-content:center;
  }
  .card-ph svg { width:100px; height:100px; opacity:0.12; }

  /* overlay */
  .card-ov {
    position:absolute; inset:0;
    background:linear-gradient(to bottom,
      rgba(8,16,8,0.05) 0%, transparent 30%,
      transparent 40%, rgba(5,12,5,0.5) 65%,
      rgba(4,10,4,0.94) 100%);
  }

  /* ── TYPE TAG ── */
  .card-tag {
    position:absolute; top:72px; left:20px;
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 13px; border-radius:3px;
    font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
    backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,0.15);
    opacity:0; transform:translateX(-12px);
    transition:all 0.5s ease 0.15s;
  }
  .card.in-view .card-tag { opacity:1; transform:translateX(0); }
  .tag-update  { background:rgba(61,92,64,0.8);  color:#b0d8b2; }
  .tag-monthly { background:rgba(201,168,76,0.2); color:var(--gold); border-color:rgba(201,168,76,0.35); }
  .tag-before  { background:rgba(30,50,110,0.65); color:#9ab4f0; }
  .tag-dot { width:5px; height:5px; border-radius:50%; background:currentColor; animation:pulse 2s infinite; }

  /* ── BOTTOM CONTENT ── */
  .card-bot { position:absolute; bottom:0; left:0; right:0; padding:0 22px 90px; }
  .card-date {
    font-size:10px; color:rgba(255,255,255,0.4);
    letter-spacing:2px; text-transform:uppercase; margin-bottom:10px;
    opacity:0; transform:translateY(8px); transition:all 0.5s ease 0.1s;
  }
  .card.in-view .card-date { opacity:1; transform:translateY(0); }
  .card-title {
    font-family:'Cormorant Garamond',serif; font-size:35px; font-weight:400;
    color:white; line-height:1.1; letter-spacing:0.5px; margin-bottom:10px;
    opacity:0; transform:translateY(14px); transition:all 0.5s ease 0.2s;
  }
  .card.in-view .card-title { opacity:1; transform:translateY(0); }
  .card-desc {
    font-size:12px; font-weight:300; color:rgba(255,255,255,0.68);
    line-height:1.8; letter-spacing:0.3px; max-width:300px;
    opacity:0; transform:translateY(14px); transition:all 0.5s ease 0.3s;
  }
  .card.in-view .card-desc { opacity:1; transform:translateY(0); }
  .card-team {
    display:flex; align-items:center; gap:10px; margin-top:16px;
    opacity:0; transform:translateY(8px); transition:all 0.5s ease 0.4s;
  }
  .card.in-view .card-team { opacity:1; transform:translateY(0); }
  .team-av {
    width:32px; height:32px; border-radius:50%;
    background:var(--moss); border:1.5px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-family:'Cormorant Garamond',serif; font-size:14px; color:var(--cream); font-weight:500;
  }
  .team-lbl { font-size:11px; color:rgba(255,255,255,0.42); }
  .team-nm  { font-size:12px; color:rgba(255,255,255,0.8); font-weight:500; }

  /* ── SIDE ACTIONS ── */
  .card-acts {
    position:absolute; left:16px; bottom:112px;
    display:flex; flex-direction:column; gap:22px; align-items:center;
    opacity:0; transform:translateX(-8px); transition:all 0.5s ease 0.35s;
  }
  .card.in-view .card-acts { opacity:1; transform:translateX(0); }
  .act { display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; }
  .act-ic {
    width:46px; height:46px; border-radius:50%;
    background:rgba(255,255,255,0.1); backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.18);
    display:flex; align-items:center; justify-content:center; transition:all 0.2s;
  }
  .act:hover .act-ic { background:rgba(255,255,255,0.2); transform:scale(1.1); }
  .act-ic svg { width:20px; height:20px; stroke:white; fill:none; stroke-width:1.8; }
  .act-lbl { font-size:10px; color:rgba(255,255,255,0.55); letter-spacing:0.5px; }
  .act.liked .act-ic { background:rgba(201,168,76,0.3); border-color:var(--gold); }
  .act.liked .act-ic svg path { fill:#c9a84c !important; stroke:#c9a84c !important; }

  /* ── PROGRESS DOTS ── */
  .dots {
    position:absolute; left:50%; bottom:76px; transform:translateX(-50%);
    display:flex; gap:5px; align-items:center; z-index:50;
  }
  .pdot {
    width:4px; height:4px; border-radius:2px;
    background:rgba(255,255,255,0.28); transition:all 0.35s ease; cursor:pointer;
  }
  .pdot.active { width:22px; background:var(--gold); }

  /* ── BOTTOM NAV ── */
  .bnav {
    position:absolute; bottom:0; left:0; right:0; z-index:200;
    background:rgba(10,18,10,0.92); backdrop-filter:blur(20px);
    padding:10px 0 16px; display:flex; justify-content:space-around;
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .ntab {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    cursor:pointer; opacity:0.4; transition:opacity 0.2s; padding:4px 20px;
  }
  .ntab.active { opacity:1; }
  .ntab svg { width:22px; height:22px; stroke:var(--cream); fill:none; stroke-width:1.8; }
  .ntab.active svg { stroke:var(--gold); }
  .ntab span { font-size:9px; color:var(--cream); letter-spacing:1.5px; text-transform:uppercase; }
  .ntab.active span { color:var(--gold); }

  /* ── STATE SCREENS ── */
  .state {
    height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px; scroll-snap-align:start;
  }
  .state-icon { width:52px; height:52px; stroke:var(--sage); fill:none; }
  .state-title { font-family:'Cormorant Garamond',serif; font-size:26px; color:var(--cream); letter-spacing:2px; }
  .state-sub { font-size:12px; color:var(--muted); letter-spacing:1px; text-align:center; max-width:260px; line-height:1.7; }
  .spinner { width:38px; height:38px; border:1.5px solid rgba(122,158,126,0.2); border-top-color:var(--sage); border-radius:50%; animation:spin 1s linear infinite; }

  /* ── TOAST ── */
  .toast {
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(14px);
    background:var(--deep); border:1px solid rgba(201,168,76,0.3);
    color:var(--cream); font-size:12px; letter-spacing:1px;
    padding:10px 22px; border-radius:6px;
    opacity:0; transition:all 0.3s ease; pointer-events:none; white-space:nowrap; z-index:9000;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── IRRIGATION CARD ── */
  .tag-irrigation { background:rgba(20,70,130,0.5); color:#8ec5f5; border-color:rgba(100,180,255,0.25); }
  .card-irr-bg {
    position:absolute; inset:0;
    background:linear-gradient(155deg,#0d2035 0%,#0f2a1e 50%,#071810 100%);
    display:flex; align-items:center; justify-content:center;
    transition:background 0.8s ease;
  }
  .card-irr-bg svg { opacity:0.1; }
  .irr-weather-badge {
    position:absolute; top:62px; right:20px;
    display:flex; flex-direction:column; align-items:flex-end;
    opacity:0; transform:translateY(-8px);
    transition:all 0.5s ease 0.2s;
  }
  .card.in-view .irr-weather-badge { opacity:1; transform:translateY(0); }
  .irr-weather-icon { width:54px; height:54px; }
  .irr-weather-temp { font-size:28px; font-weight:300; color:var(--cream); line-height:1; text-align:right; }
  .irr-weather-desc { font-size:10px; color:rgba(255,255,255,0.45); letter-spacing:0.5px; margin-top:4px; text-align:right; }
  .card-irr-stats {
    display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:14px;
    opacity:0; transform:translateY(8px); transition:all 0.5s ease 0.35s;
  }
  .card.in-view .card-irr-stats { opacity:1; transform:translateY(0); }
  .irr-stat { background:rgba(255,255,255,0.07); border-radius:8px; padding:9px 11px; }
  .irr-stat-label { font-size:9px; color:rgba(255,255,255,0.4); letter-spacing:1px; margin-bottom:4px; }
  .irr-stat-value { font-size:14px; font-weight:500; color:var(--cream); line-height:1.2; }
  .irr-days { grid-column:1/-1; }
  .conn-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-left:5px; vertical-align:middle; }
  .conn-on  { background:#6dcc72; box-shadow:0 0 5px #6dcc72; animation:pulse 2s infinite; }
  .conn-off { background:#f05050; }

  @keyframes riseIn   { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  @keyframes loadBar  { to{width:100%} }
  @keyframes spin     { to{transform:rotate(360deg)} }
  @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes spinLogo { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div id="splash-bg"></div>
  <div id="splash-overlay"></div>
  <div class="s-logo-wrap">
    <img class="s-logo" src="logo_transparent.png" alt="LIGA Garden"/>
  </div>
  <div class="s-sub">Garden Experience</div>
  <div class="s-bar"><div class="s-bar-fill"></div></div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">LIGA</div>
      <div class="topbar-client" id="top-client"></div>
    </div>
    <div class="topbar-btn" onclick="shareApp()">
      <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </div>
  </div>

  <div id="feed"></div>
  <div class="dots" id="dots"></div>

  <div class="bnav">
    <div class="ntab active">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>פיד</span>
    </div>
    <div class="ntab">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>גלריה</span>
    </div>
    <div class="ntab">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>פרופיל</span>
    </div>
  </div>
</div>

<div class="toast" id="toast">הקישור הועתק ✓</div>

<script>
// API endpoint — Netlify Function (no CORS!)
const API = '/.netlify/functions/feed';

const CLIENT = decodeURIComponent(
  new URLSearchParams(window.location.search).get('client') || ''
);

// ── helpers ──
const fmtDate = s => {
  if (!s) return '';
  try { return new Date(s).toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'}); }
  catch(e){ return s; }
};
const initials = n => {
  if (!n) return 'L';
  const name = Array.isArray(n) ? n[0] : n;
  return (name||'').trim().split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase();
};

function tagConfig(type) {
  const t = (type||'').toLowerCase();
  if (t.includes('monthly')||t.includes('recommend')) return {cls:'tag-monthly', label:'המלצה חודשית'};
  if (t.includes('before') ||t.includes('after'))     return {cls:'tag-before',  label:'לפני / אחרי'};
  return {cls:'tag-update', label:'עדכון שוטף'};
}

// ── fetch via Netlify Function ──
async function fetchFeed() {
  const params = new URLSearchParams();
  if (CLIENT) params.set('client', CLIENT);
  const resp = await fetch(`${API}?${params}`);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const data = await resp.json();
  return data;
}

// ── build card ──
function buildCard(rec, idx) {
  const f    = rec.fields || {};
  const imgs = (f.Image || []).map(a => a.url);
  const tc   = tagConfig(f.Type);
  const isBefore = (f.Type||'').toLowerCase().includes('before');

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.index = idx;

  // MEDIA
  if (imgs.length >= 2 && isBefore) {
    const g = document.createElement('div'); g.className = 'card-grid';
    ['לפני','אחרי'].forEach((lbl,j) => {
      if (!imgs[j]) return;
      const col = document.createElement('div'); col.className = 'col';
      const im = document.createElement('img'); im.src = imgs[j]; im.loading = 'lazy'; im.alt = lbl;
      const lb = document.createElement('div'); lb.className = 'ba-label'; lb.textContent = lbl;
      col.appendChild(im); col.appendChild(lb); g.appendChild(col);
    });
    card.appendChild(g);
  } else if (imgs.length) {
    const im = document.createElement('img');
    im.className = 'card-img'; im.src = imgs[0]; im.loading = 'lazy'; im.alt = f.Title||'';
    card.appendChild(im);
  } else {
    const ph = document.createElement('div'); ph.className = 'card-ph';
    ph.innerHTML = `<svg viewBox="0 0 100 100" fill="none">
      <path d="M50 8C50 8 85 28 82 58C79 82 50 85 50 85C50 85 21 82 18 58C15 28 50 8 50 8Z" stroke="#7a9e7e" stroke-width="1.5"/>
      <path d="M50 85V20" stroke="#7a9e7e" stroke-width="1" stroke-dasharray="4 5"/>
      <path d="M50 60 Q65 50 75 38" stroke="#7a9e7e" stroke-width="1"/>
      <path d="M50 68 Q35 58 25 46" stroke="#7a9e7e" stroke-width="1"/>
    </svg>`;
    card.appendChild(ph);
  }

  // overlay, tag, actions, bottom
  const ov = document.createElement('div'); ov.className = 'card-ov'; card.appendChild(ov);

  const tg = document.createElement('div'); tg.className = `card-tag ${tc.cls}`;
  tg.innerHTML = `<span class="tag-dot"></span>${tc.label}`; card.appendChild(tg);

  const acts = document.createElement('div'); acts.className = 'card-acts';
  acts.innerHTML = `
    <div class="act" onclick="likeThis(this)">
      <div class="act-ic"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></div>
      <span class="act-lbl">אהבתי</span>
    </div>
    <div class="act" onclick="shareApp()">
      <div class="act-ic"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div>
      <span class="act-lbl">שתף</span>
    </div>`;
  card.appendChild(acts);

  const bot = document.createElement('div'); bot.className = 'card-bot';
  bot.innerHTML = `
    <div class="card-date">${fmtDate(f.Date)}</div>
    <div class="card-title">${f.Title || tc.label}</div>
    ${f.Description ? `<div class="card-desc">${f.Description}</div>` : ''}
    <div class="card-team">
      <div class="team-av">${initials(f.Client)}</div>
      <div><div class="team-lbl">גינן אחראי</div><div class="team-nm">צוות LIGA Garden</div></div>
    </div>`;
  card.appendChild(bot);
  return card;
}

// ── dots ──
function buildDots(n) {
  const w = document.getElementById('dots'); w.innerHTML = '';
  for (let i=0; i<n; i++) {
    const d = document.createElement('div');
    d.className = 'pdot' + (i===0?' active':'');
    d.onclick = () => document.querySelectorAll('.card')[i]?.scrollIntoView({behavior:'smooth'});
    w.appendChild(d);
  }
}
function setDot(i) { document.querySelectorAll('.pdot').forEach((d,j)=>d.classList.toggle('active',j===i)); }

function observe() {
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      e.target.classList.toggle('in-view', e.isIntersecting);
      if (e.isIntersecting) {
        const idx = +e.target.dataset.index;
        setDot(idx);
        const title = e.target.querySelector('.card-title')?.textContent || '';
        gtag('event', 'card_view', {
          event_category: 'feed',
          event_label: title,
          card_index: idx,
          client_name: CLIENT || 'unknown'
        });
      }
    });
  }, {threshold:0.6});
  document.querySelectorAll('.card').forEach(c => obs.observe(c));
}

// ── interactions ──
function likeThis(el) {
  el.classList.toggle('liked');
  const card = el.closest('.card');
  const title = card?.querySelector('.card-title')?.textContent || '';
  gtag('event', 'like', {
    event_category: 'engagement',
    event_label: title,
    client_name: CLIENT || 'unknown'
  });
}
function shareApp() {
  gtag('event', 'share', {
    event_category: 'engagement',
    client_name: CLIENT || 'unknown'
  });
  if (navigator.share) { navigator.share({title:'LIGA Garden', url:location.href}); return; }
  navigator.clipboard?.writeText(location.href).catch(()=>{});
  const t = document.getElementById('toast');
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── irrigation helpers ──
const HEB_DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const DAY_KEYS = ['DSundayState','DMondayState','DTuesdayState','DWednesdayState','DThursdayState','DFridayState','DSaturdayState'];

function formatNextIrrigation(nextArr) {
  if (!nextArr || !nextArr.length) return '—';
  const n = nextArr[0];
  const mins = n.NextStartTime || 0;
  const day  = n.DayToNextStart || 0;
  const h = String(Math.floor(mins / 60)).padStart(2,'0');
  const m = String(mins % 60).padStart(2,'0');
  const dayLabel = day === 0 ? 'היום' : day === 1 ? 'מחר' : `בעוד ${day} ימים`;
  return `${dayLabel} ${h}:${m}`;
}

function getWeatherGradient(conditionId, isNight) {
  if (!conditionId) return 'linear-gradient(155deg,#0d2035 0%,#0f2a1e 50%,#071810 100%)';
  if (isNight) return 'linear-gradient(135deg, #050d1a, #0d1f3c, #1a2952)';
  if (conditionId === 800) return 'linear-gradient(135deg, #1a3a2a, #2d5a1b, #c9a84c33)';
  if (conditionId >= 801 && conditionId <= 804) return 'linear-gradient(135deg, #1a2535, #2a3f55, #4a6080)';
  if ((conditionId >= 300 && conditionId < 400) || (conditionId >= 500 && conditionId < 600)) return 'linear-gradient(135deg, #0d1b2a, #1a3a5c, #2d6a9f44)';
  if (conditionId >= 200 && conditionId < 300) return 'linear-gradient(135deg, #0a0a1a, #1a1a3a, #3a2a5c)';
  return 'linear-gradient(155deg,#0d2035 0%,#0f2a1e 50%,#071810 100%)';
}

function buildIrrigationCard(unit, idx, weather) {
  const cfg        = unit.Config || {};
  const connected  = cfg.ConnectionStatus === true;
  const hasAlarm   = (cfg.DeviceAlarm || 0) > 0;
  const totalMonth = unit.Accumulators?.[0]?.TotalMonth;
  const validDays  = unit.ValidDays || {};
  const activeDays = DAY_KEYS.map((k,i) => validDays[k] ? HEB_DAYS[i] : null).filter(Boolean);
  const nextIrr    = formatNextIrrigation(unit.NextIrrigationOnline);

  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.index = idx;

  // weather-based background
  const isNight = weather && weather.dt && weather.sunrise && weather.sunset
    ? (weather.dt < weather.sunrise || weather.dt > weather.sunset)
    : false;
  const gradient = getWeatherGradient(weather && weather.conditionId, isNight);

  const bg = document.createElement('div'); bg.className = 'card-irr-bg';
  bg.style.background = gradient;
  bg.innerHTML = `<svg width="220" height="220" viewBox="0 0 200 200" fill="none">
    <path d="M100 20C100 20 160 70 160 120C160 155 133 175 100 175C67 175 40 155 40 120C40 70 100 20 100 20Z" stroke="#7ab8f5" stroke-width="1.5"/>
    <path d="M100 175L100 55" stroke="#7ab8f5" stroke-width="0.8" stroke-dasharray="4 5"/>
    <path d="M100 140Q122 118 142 98" stroke="#7ab8f5" stroke-width="0.8"/>
    <path d="M100 155Q78 133 58 113" stroke="#7ab8f5" stroke-width="0.8"/>
    <circle cx="100" cy="175" r="3" fill="#7ab8f5"/>
  </svg>`;
  card.appendChild(bg);

  // overlay
  const ov = document.createElement('div'); ov.className = 'card-ov'; card.appendChild(ov);

  // weather badge (top-right)
  if (weather && weather.temp != null) {
    const wb = document.createElement('div'); wb.className = 'irr-weather-badge';
    wb.innerHTML = `
      <img class="irr-weather-icon" src="https://openweathermap.org/img/wn/${weather.icon}@2x.png" alt="${weather.description}">
      <div class="irr-weather-temp">${weather.temp}°</div>
      <div class="irr-weather-desc">${weather.description}</div>`;
    card.appendChild(wb);
  }

  // tag
  const tg = document.createElement('div'); tg.className = 'card-tag tag-irrigation';
  tg.innerHTML = `<span class="tag-dot"></span>השקיה`; card.appendChild(tg);

  // actions
  const acts = document.createElement('div'); acts.className = 'card-acts';
  acts.innerHTML = `<div class="act" onclick="shareApp()">
    <div class="act-ic"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg></div>
    <span class="act-lbl">שתף</span>
  </div>`;
  card.appendChild(acts);

  // bottom
  const statusText = hasAlarm ? `<span style="color:#f08080">⚠️ יש תקלה</span>` : `<span style="color:#9ecfa0">✅ מערכת תקינה</span>`;
  const connHTML   = `<span class="conn-dot ${connected ? 'conn-on' : 'conn-off'}"></span>${connected ? 'מחובר' : 'לא מחובר'}`;
  const daysHTML   = activeDays.length ? activeDays.join(' · ') : 'לא הוגדרו ימים';
  const waterHTML  = totalMonth != null ? `${totalMonth} מ״ק` : '—';

  const bot = document.createElement('div'); bot.className = 'card-bot';
  bot.innerHTML = `
    <div class="card-date">${statusText}</div>
    <div class="card-title">${unit.UnitName || 'מערכת השקיה'}</div>
    <div class="card-desc" style="font-size:11px;color:rgba(255,255,255,0.4)">${connHTML}</div>
    <div class="card-irr-stats">
      <div class="irr-stat">
        <div class="irr-stat-label">צריכה החודש</div>
        <div class="irr-stat-value">${waterHTML}</div>
      </div>
      <div class="irr-stat">
        <div class="irr-stat-label">השקיה הבאה</div>
        <div class="irr-stat-value" style="font-size:12px">${nextIrr}</div>
      </div>
      <div class="irr-stat irr-days">
        <div class="irr-stat-label">ימי השקיה</div>
        <div class="irr-stat-value" style="font-size:12px">${daysHTML}</div>
      </div>
    </div>`;
  card.appendChild(bot);
  return card;
}

async function fetchGalconUnit(serialNumber) {
  console.log('[Galcon] Looking up serial number:', serialNumber);
  try {
    // Step 1: ask the server to find projectId+unitId by scanning Config.SN
    const lookupResp = await fetch(`/.netlify/functions/galcon?serialNumber=${encodeURIComponent(serialNumber)}`);
    const lookup = await lookupResp.json();
    console.log('[Galcon] Lookup result:', JSON.stringify(lookup));

    if (!lookup.projectId || !lookup.unitId) {
      console.warn('[Galcon] Serial number not found:', serialNumber);
      return null;
    }

    // Step 2: fetch full unit data
    const url = `/.netlify/functions/galcon?unitId=${lookup.unitId}&projectId=${lookup.projectId}`;
    console.log('[Galcon] Fetching full unit data:', url);
    const unitData = await fetch(url).then(r => r.json());
    console.log('[Galcon] Full unit data:', JSON.stringify(unitData).substring(0, 300));

    return (unitData && unitData.Body) || unitData || null;
  } catch(e) {
    console.warn('[Galcon] fetchGalconUnit failed:', e.message);
    return null;
  }
}

// ── states ──
const feed = () => document.getElementById('feed');
const showLoading = () => { feed().innerHTML=`<div class="state"><div class="spinner"></div><div class="state-title">טוענת את הגינה</div><div class="state-sub">רגע אחד...</div></div>`; };
const showError   = () => { feed().innerHTML=`<div class="state"><svg class="state-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><div class="state-title">שגיאה בטעינה</div><div class="state-sub">לא ניתן לטעון את הנתונים.<br>נסה שוב עוד רגע.</div></div>`; };
const showEmpty   = () => { feed().innerHTML=`<div class="state"><svg class="state-icon" viewBox="0 0 24 24"><path d="M12 2C12 2 20 8 19 16C18 22 12 22 12 22C12 22 6 22 5 16C4 8 12 2 12 2Z"/></svg><div class="state-title">הגינה ממתינה</div><div class="state-sub">עדיין אין עדכונים פעילים.<br>הם יופיעו כאן בקרוב 🌱</div></div>`; };

// ── init ──
async function init() {
  if (CLIENT) {
    document.getElementById('top-client').textContent = CLIENT;
    gtag('event', 'page_view', {
      page_title: `LIGA Garden – ${CLIENT}`,
      client_name: CLIENT
    });
  }
  showLoading();
  try {
    const data = await fetchFeed();
    const recs = data.records || [];

    // הצג תמונת גינה ב-Splash
    if (data.profilePhoto) {
      const bg = document.getElementById('splash-bg');
      bg.style.backgroundImage = `url('${data.profilePhoto}')`;
      const img = new Image();
      img.onload = () => bg.classList.add('loaded');
      img.src = data.profilePhoto;
    }

    // סגור Splash אחרי 3 שניות
    setTimeout(() => document.getElementById('splash').classList.add('out'), 3000);

    // Fetch galcon + weather in parallel
    console.log('data.serialNumber:', data.serialNumber);
    const [galconUnit, weather] = await Promise.all([
      data.serialNumber ? fetchGalconUnit(data.serialNumber) : Promise.resolve(null),
      fetch('/.netlify/functions/weather').then(r => r.json()).catch(e => { console.warn('[Weather] fetch failed:', e.message); return null; })
    ]);
    console.log('[Galcon] galconUnit resolved:', galconUnit ? (galconUnit.UnitName || JSON.stringify(galconUnit).substring(0, 150)) : 'null');
    console.log('[Weather] data:', weather ? `${weather.temp}°C id:${weather.conditionId} icon:${weather.icon}` : 'null');

    if (!recs.length && !galconUnit) { showEmpty(); return; }

    feed().innerHTML = '';
    recs.forEach((r,i) => feed().appendChild(buildCard(r,i)));

    // Insert irrigation card at position 1 (after first feed card, or first if feed is empty)
    if (galconUnit) {
      const cards = feed().querySelectorAll('.card');
      const irrCard = buildIrrigationCard(galconUnit, cards.length > 0 ? 1 : 0, weather);
      feed().insertBefore(irrCard, cards[1] || null);
      feed().querySelectorAll('.card').forEach((c,i) => c.dataset.index = i);
    }

    buildDots(feed().querySelectorAll('.card').length);
    observe();
    setTimeout(() => document.querySelector('.card')?.classList.add('in-view'), 150);
  } catch(e) {
    console.error(e);
    setTimeout(() => document.getElementById('splash').classList.add('out'), 2600);
    showError();
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
